version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: xenoguard_mysql
    environment:
      MYSQL_ROOT_PASSWORD: xenoguard_root
      MYSQL_DATABASE: xenoguard
      MYSQL_USER: xenoguard
      MYSQL_PASSWORD: xenoguard_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xenoguard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
